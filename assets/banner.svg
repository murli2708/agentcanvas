<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="'Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0418"/><stop offset="0.5" stop-color="#240A3E"/><stop offset="1" stop-color="#3D0E55"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#E879F9" stop-opacity="0.28"/><stop offset="1" stop-color="#E879F9" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#A78BFA" stop-opacity="0.30"/><stop offset="1" stop-color="#A78BFA" stop-opacity="0"/></radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/></filter>
    <marker id="fuch" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#E879F9"/></marker>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="320" fill="url(#glowA)"/>
  <circle cx="980" cy="320" r="240" fill="url(#glowB)"/>
  <rect x="0" y="0" width="6" height="440" fill="#E879F9"/>

  <g transform="translate(64,46)">
    <rect x="0" y="0" width="288" height="38" rx="19" fill="#E879F9" fill-opacity="0.12" stroke="#E879F9" stroke-opacity="0.55"/>
    <circle cx="26" cy="19" r="6" fill="#E879F9" filter="url(#soft)"/>
    <text x="44" y="25" fill="#F0ABFC" font-family="'JetBrains Mono',monospace" font-size="16" letter-spacing="3">PHASE 5 · THE IMAGINATION</text>
  </g>
  <text x="1216" y="52" text-anchor="end" fill="#8A6AA0" font-family="'JetBrains Mono',monospace" font-size="15" letter-spacing="2">AURORA SERIES · 05 / 06</text>

  <text x="62" y="172" fill="#FFFFFF" font-size="80" font-weight="800" letter-spacing="-2">AgentCanvas</text>
  <text x="64" y="214" fill="#F0ABFC" font-size="26" font-weight="500">An agent that builds its own interface.</text>
  <text x="64" y="246" fill="#A789BE" font-size="18" font-family="'JetBrains Mono',monospace">plan · call tools · emit valid JSON · render live widgets</text>

  <g transform="translate(64,286)" font-family="'JetBrains Mono',monospace">
    <g filter="url(#ds)">
      <rect x="0" y="0" width="164" height="74" rx="14" fill="#1E0A30" stroke="#E879F9" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#F0ABFC" font-size="26" font-weight="800">100%</text>
      <text x="16" y="58" fill="#A789BE" font-size="13">valid JSON</text>
    </g>
    <g filter="url(#ds)" transform="translate(180,0)">
      <rect x="0" y="0" width="164" height="74" rx="14" fill="#1E0A30" stroke="#E879F9" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#F0ABFC" font-size="26" font-weight="800">≥ 99%</text>
      <text x="16" y="58" fill="#A789BE" font-size="13">safe render</text>
    </g>
    <g filter="url(#ds)" transform="translate(360,0)">
      <rect x="0" y="0" width="166" height="74" rx="14" fill="#1E0A30" stroke="#E879F9" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#F0ABFC" font-size="26" font-weight="800">0 eval</text>
      <text x="16" y="58" fill="#A789BE" font-size="13">allow-list only</text>
    </g>
  </g>

  <g transform="translate(792,64)" filter="url(#ds)">
    <rect x="0" y="0" width="424" height="312" rx="20" fill="#160826" fill-opacity="0.78" stroke="#E879F9" stroke-opacity="0.32"/>
    <text x="24" y="34" fill="#F0ABFC" font-family="'JetBrains Mono',monospace" font-size="14" letter-spacing="2">AGENT LOOP → GENERATED UI</text>
    <line x1="24" y1="46" x2="400" y2="46" stroke="#E879F9" stroke-opacity="0.18"/>

    <g transform="translate(0,150)">
      <!-- agent loop (circular) -->
      <g transform="translate(78,0)">
        <circle r="48" fill="none" stroke="#A78BFA" stroke-width="3" stroke-dasharray="4 6" opacity="0.7"/>
        <circle r="30" fill="#1E1140" stroke="#E879F9" stroke-width="2.5"/>
        <text x="0" y="-4" fill="#F0ABFC" font-size="12" text-anchor="middle" font-family="'JetBrains Mono',monospace">plan</text>
        <text x="0" y="12" fill="#C4B5FD" font-size="10" text-anchor="middle" font-family="'JetBrains Mono',monospace">→act</text>
        <!-- loop arrowhead -->
        <path d="M44 -20 A48 48 0 0 1 44 20" fill="none" stroke="#E879F9" stroke-width="3" marker-end="url(#fuch)"/>
        <text x="0" y="74" fill="#F0ABFC" font-size="12" text-anchor="middle" font-family="'JetBrains Mono',monospace">agent</text>
      </g>
      <path d="M134 0 H168" stroke="#E879F9" stroke-width="3" marker-end="url(#fuch)"/>
      <!-- grammar-constrained JSON -->
      <g transform="translate(178,-44)">
        <rect x="0" y="0" width="96" height="88" rx="10" fill="#0F0720" stroke="#A78BFA" stroke-width="2"/>
        <text x="12" y="26" fill="#FBBF24" font-size="13" font-family="'JetBrains Mono',monospace">{</text>
        <text x="26" y="44" fill="#A7F3D0" font-size="11" font-family="'JetBrains Mono',monospace">"ui":</text>
        <text x="26" y="60" fill="#93C5FD" font-size="11" font-family="'JetBrains Mono',monospace">[...]</text>
        <text x="12" y="78" fill="#FBBF24" font-size="13" font-family="'JetBrains Mono',monospace">}</text>
        <text x="48" y="106" fill="#C4B5FD" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">grammar JSON</text>
      </g>
      <path d="M284 0 H318" stroke="#E879F9" stroke-width="3" marker-end="url(#fuch)"/>
      <!-- rendered widget tree -->
      <g transform="translate(328,-50)">
        <rect x="0" y="0" width="80" height="100" rx="9" fill="#0F0720" stroke="#E879F9" stroke-width="2.5"/>
        <rect x="12" y="14" width="56" height="14" rx="3" fill="#A78BFA" opacity="0.8"/>
        <rect x="12" y="36" width="56" height="22" rx="4" fill="#E879F9" opacity="0.25" stroke="#E879F9"/>
        <rect x="12" y="66" width="26" height="18" rx="9" fill="#34D399" opacity="0.85"/>
        <rect x="44" y="66" width="24" height="18" rx="9" fill="#F0ABFC" opacity="0.6"/>
        <text x="40" y="112" fill="#F0ABFC" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">RFW</text>
      </g>
    </g>

    <line x1="24" y1="272" x2="400" y2="272" stroke="#E879F9" stroke-opacity="0.18"/>
    <text x="212" y="294" fill="#CFA9E0" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">model output is untrusted input</text>
  </g>

  <g transform="translate(64,402)" font-family="'JetBrains Mono',monospace" font-size="13" fill="#F0ABFC">
    <g><rect x="0" y="0" width="78" height="26" rx="13" fill="#E879F9" fill-opacity="0.14"/><text x="39" y="17" text-anchor="middle">Flutter</text></g>
    <g transform="translate(90,0)"><rect x="0" y="0" width="58" height="26" rx="13" fill="#E879F9" fill-opacity="0.14"/><text x="29" y="17" text-anchor="middle">RFW</text></g>
    <g transform="translate(160,0)"><rect x="0" y="0" width="110" height="26" rx="13" fill="#E879F9" fill-opacity="0.14"/><text x="55" y="17" text-anchor="middle">GBNF / tools</text></g>
    <g transform="translate(282,0)"><rect x="0" y="0" width="118" height="26" rx="13" fill="#E879F9" fill-opacity="0.14"/><text x="59" y="17" text-anchor="middle">on-device LLM</text></g>
  </g>
</svg>
